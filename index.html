<style>
  :root{
    --ink:#23201B; --ink-soft:#6B655B; --ink-faint:#A39C90;
    --paper:#F2F0EA; --card:#FFFFFF;
    --jade:#146B5B; --jade-soft:#E4EFEC;
    --ochre:#C8811F; --ochre-soft:#FBEFDC;
    --red:#B4462F;
    --line:#E7E3DA; --line-soft:#EFEBE3;
    --shadow:0 1px 2px rgba(35,32,27,.04), 0 8px 24px rgba(35,32,27,.06);
    --shadow-lg:0 10px 40px rgba(35,32,27,.16);
    --radius:22px;
    --serif:ui-serif, Georgia, "Times New Roman", serif;
    --sans:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{font-family:var(--sans); background:var(--paper); color:var(--ink);
    -webkit-text-size-adjust:100%; text-rendering:optimizeLegibility; -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;}
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input{font-family:inherit;}

  .app{max-width:480px; margin:0 auto; min-height:100vh;
    padding:calc(env(safe-area-inset-top) + 8px) 20px calc(env(safe-area-inset-bottom) + 28px);}

  /* Header */
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:8px 2px 4px;}
  .brand{display:flex; align-items:center; gap:9px;}
  .brand .mark{width:30px; height:30px; border-radius:9px; background:var(--jade); display:grid; place-items:center; box-shadow:0 2px 6px rgba(20,107,91,.28);}
  .brand .mark svg{width:16px; height:16px;}
  .brand .name{font-family:var(--sans); font-size:23px; letter-spacing:-.4px; font-weight:700; line-height:1;}
  .monthnav{display:flex; align-items:center; gap:2px;}
  .monthnav button{width:34px; height:34px; border-radius:50%; display:grid; place-items:center; color:var(--ink-soft); transition:background .15s;}
  .monthnav button:active{background:var(--line-soft);}
  .monthnav .label{min-width:96px; text-align:center; font-size:14px; font-weight:600; letter-spacing:.2px;}
  .monthnav .label .yr{color:var(--ink-faint); font-weight:500;}

  .summary{margin:14px 0 18px; padding:0 4px; display:flex; align-items:baseline; justify-content:space-between;}
  .summary .lbl{font-size:11px; letter-spacing:.9px; text-transform:uppercase; color:var(--ink-faint); font-weight:600;}
  .summary .amt{font-size:15px; font-weight:600;}
  .summary .amt .cur{color:var(--ink-faint); font-weight:500;}

  /* Card */
  .card{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px 18px 16px; margin-bottom:16px; border:1px solid rgba(231,227,218,.6);}
  .card-head{display:flex; align-items:center; gap:13px;}
  .avatar{width:46px; height:46px; border-radius:14px; flex:none; display:grid; place-items:center; font-weight:700; font-size:16px; letter-spacing:.5px; color:#fff; box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);}
  .who{flex:1; min-width:0;}
  .who .nm{font-size:17px; font-weight:650; letter-spacing:.1px; line-height:1.15;}
  .who .rl{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
  .pay{text-align:right; flex:none;}
  .pay .big{font-size:16px; font-weight:650;}
  .pay .cur{color:var(--ink-faint); font-weight:500;}
  .pay .per{font-size:10.5px; color:var(--ink-faint); letter-spacing:.3px;}

  .statusrow{display:flex; align-items:center; gap:8px; margin:15px 0 14px; flex-wrap:wrap;}
  .chip{display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px; font-size:12.5px; font-weight:600; background:var(--line-soft); color:var(--ink-soft);}
  .chip .dot{width:7px; height:7px; border-radius:50%;}
  .chip.leave{background:var(--ochre-soft); color:#93611A;} .chip.leave .dot{background:var(--ochre);}
  .chip.clean{background:var(--jade-soft); color:#0E5849;} .chip.clean .dot{background:var(--jade);}
  .chip.over{background:#F7E4DE; color:#8F3320;} .chip.over .dot{background:var(--red);}
  .chip.adv{background:var(--ochre-soft); color:#8F5D14; cursor:pointer;} .chip.adv .dot{background:var(--ochre);}

  .btn{height:48px; border-radius:15px; font-size:15px; font-weight:650; letter-spacing:.1px; display:flex; align-items:center; justify-content:center; gap:8px; transition:transform .08s ease, background .15s, opacity .15s; user-select:none;}
  .btn:active{transform:scale(.975);}
  .btn-primary{width:100%; background:var(--ink); color:var(--paper);}
  .btn-marked{width:100%; background:var(--ochre-soft); color:#8F5D14; box-shadow:inset 0 0 0 1.5px rgba(200,129,31,.4);}
  .btn svg{width:18px; height:18px;}
  .actions2{display:flex; gap:10px; margin-top:10px;}
  .actions2 .btn{flex:1; height:44px; border-radius:13px; font-size:14px;}
  .btn-ghost{background:transparent; color:var(--jade); box-shadow:inset 0 0 0 1.5px var(--jade-soft);}
  .btn-ghost.owed{color:#8F5D14; box-shadow:inset 0 0 0 1.5px rgba(200,129,31,.4);}

  .managebar{display:flex; justify-content:center; margin-top:6px;}
  .managebar button{display:inline-flex; align-items:center; gap:7px; padding:10px 16px; border-radius:999px; font-size:13px; font-weight:600; color:var(--ink-soft); transition:background .15s;}
  .managebar button:active{background:var(--line-soft);}
  .managebar svg{width:15px; height:15px;}

  /* Install banner */
  .installbar{position:fixed; left:12px; right:12px; bottom:calc(env(safe-area-inset-bottom) + 12px); z-index:70; background:var(--ink); color:var(--paper); border-radius:16px; padding:11px 11px 11px 13px; display:flex; align-items:center; gap:11px; box-shadow:var(--shadow-lg); max-width:456px; margin:0 auto;}
  .installbar .ib-ic{width:34px; height:34px; border-radius:9px; background:var(--jade); display:grid; place-items:center; flex:none;}
  .installbar .ib-txt{flex:1; min-width:0; line-height:1.28;}
  .installbar .ib-txt b{font-size:14px; font-weight:650; display:block;}
  .installbar .ib-txt span{font-size:12px; opacity:.72;}
  .installbar .ib-btn{flex:none; background:var(--paper); color:var(--ink); font-weight:700; font-size:13px; padding:9px 16px; border-radius:11px;}
  .installbar .ib-x{flex:none; color:var(--paper); opacity:.55; padding:6px; font-size:15px;}

  /* Toast */
  .toast{position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 22px); transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--paper); padding:13px 16px; border-radius:16px; display:flex; align-items:center; gap:14px; box-shadow:var(--shadow-lg); font-size:14px; font-weight:550; opacity:0; pointer-events:none; transition:opacity .22s, transform .22s; z-index:60; max-width:calc(100% - 40px);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}
  .toast button{color:#F0B85A; font-weight:700; font-size:14px; padding:4px;}

  /* Sheet */
  .scrim{position:fixed; inset:0; background:rgba(35,32,27,.34); backdrop-filter:blur(3px); opacity:0; pointer-events:none; transition:opacity .25s; z-index:40;}
  .scrim.show{opacity:1; pointer-events:auto;}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:50; background:var(--paper); border-radius:26px 26px 0 0; max-width:480px; margin:0 auto; max-height:94vh; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .34s cubic-bezier(.32,.72,0,1); box-shadow:var(--shadow-lg);}
  .sheet.show{transform:translateY(0);}
  .sheet-grip{padding:10px 0 2px; display:flex; justify-content:center; flex:none;}
  .sheet-grip span{width:38px; height:5px; border-radius:3px; background:var(--line);}
  .sheet-head{display:flex; align-items:center; justify-content:space-between; padding:6px 20px 12px; flex:none;}
  .sheet-head .t{font-family:var(--sans); font-size:20px; font-weight:700; letter-spacing:-.3px;}
  .sheet-head .t small{font-family:var(--sans); font-size:12.5px; color:var(--ink-soft); font-weight:500; display:block; margin-top:1px;}
  .sheet-head .x{width:32px; height:32px; border-radius:50%; background:var(--line-soft); display:grid; place-items:center; color:var(--ink-soft);}
  .sheet-body{overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 20px calc(env(safe-area-inset-bottom) + 24px);}

  /* Slip */
  .slip{background:#FFFDF8; border-radius:20px; border:1px solid var(--line); padding:24px 22px; box-shadow:var(--shadow);}
  .slip-top{text-align:center; padding-bottom:16px; border-bottom:1.5px solid var(--line);}
  .slip-mast{display:flex; align-items:flex-end; justify-content:space-between; padding-bottom:13px; border-bottom:1.5px solid var(--jade);}
  .slip-mast .brand{display:flex; align-items:center; gap:9px;}
  .slip-mast .mglyph{width:28px; height:28px; border-radius:8px; background:var(--jade); display:flex; align-items:center; justify-content:center;}
  .slip-mast .mword{font-family:var(--sans); font-size:21px; font-weight:700; letter-spacing:-.4px; color:var(--jade); line-height:1;}
  .slip-mast .mdoc{text-align:right;}
  .slip-mast .meyebrow{font-size:9px; letter-spacing:2.6px; text-transform:uppercase; color:var(--ink-faint); font-weight:700;}
  .slip-mast .mmo{font-family:var(--sans); font-size:18px; font-weight:700; letter-spacing:-.3px; margin-top:3px;}
  .slip-mast .mmo .ml2{font-family:var(--sans); font-size:12px; font-weight:400; color:var(--ink-soft); margin-left:6px;}
  .slip-top .kicker{font-size:10.5px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-faint); font-weight:700;}
  .slip-top h2{font-family:var(--serif); font-size:23px; margin:7px 0 2px; font-weight:600;}
  .slip-top .ta{font-size:13px; color:var(--ink-soft);}
  .slip-top .mo{font-size:13px; color:var(--ink-soft); margin-top:8px; font-weight:600;}
  .slip-person{display:flex; align-items:center; gap:12px; padding:16px 0; border-bottom:1px solid var(--line-soft);}
  .slip-person .avatar{width:42px; height:42px; border-radius:12px;}
  .slip-person .nm{font-size:16px; font-weight:650;}
  .slip-person .rl{font-size:12.5px; color:var(--ink-soft); margin-top:1px;}

  .cal{margin:18px 0 6px;}
  .cal-title{font-size:11px; letter-spacing:.8px; text-transform:uppercase; color:var(--ink-faint); font-weight:700; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .cal-dow{font-size:10px; text-align:center; color:var(--ink-faint); font-weight:600; padding-bottom:2px;}
  .cal-cell{aspect-ratio:1; border-radius:9px; display:grid; place-items:center; font-size:12px; font-weight:600; color:var(--ink-soft); background:var(--line-soft); position:relative; user-select:none;}
  .cal-cell.empty{background:transparent;}
  .cal-cell.worked{background:var(--jade-soft); color:#0E5849;}
  .cal-cell.leave{background:var(--ochre); color:#fff;}
  .cal-cell.future{background:transparent; color:var(--ink-faint); box-shadow:inset 0 0 0 1px var(--line-soft);}
  .cal-cell.today{box-shadow:inset 0 0 0 2px var(--ink);}
  .cal-cell.tap{cursor:pointer; transition:transform .08s;}
  .cal-cell.tap:active{transform:scale(.9);}
  .legend{display:flex; gap:16px; justify-content:center; margin-top:12px; font-size:11.5px; color:var(--ink-soft);}
  .legend span{display:inline-flex; align-items:center; gap:6px;}
  .legend i{width:10px; height:10px; border-radius:3px; display:inline-block;}

  .break{margin-top:18px; border-top:1.5px solid var(--line); padding-top:14px;}
  .row{display:flex; justify-content:space-between; align-items:baseline; padding:7px 0; font-size:14px;}
  .row .k{color:var(--ink-soft);}
  .row .k .ta{display:block; font-size:11px; color:var(--ink-faint); margin-top:1px;}
  .row .v{font-weight:600;}
  .row.ded .v{color:var(--red);}
  .row.sub{font-size:13px; color:var(--ink-faint);} .row.sub .v{color:var(--ink-faint); font-weight:500;}

  .slip-adv{margin-top:14px; border-top:1px solid var(--line-soft); padding-top:12px;}
  .slip-adv h4{font-size:11px; letter-spacing:.8px; text-transform:uppercase; color:var(--ink-faint); font-weight:700; margin:0 0 8px; display:flex; justify-content:space-between;}
  .slip-adv .ln{display:flex; justify-content:space-between; font-size:13px; padding:4px 0; color:var(--ink-soft);}
  .slip-adv .ln .amt.g{color:var(--jade); font-weight:600;}
  .slip-adv .ln .amt.d{color:var(--ochre); font-weight:600;}
  .slip-adv .pend{display:flex; justify-content:space-between; border-top:1px solid var(--line-soft); margin-top:6px; padding-top:8px; font-weight:700; font-size:13.5px;}
  .slip-adv .pend .ta{display:block; font-size:10px; color:var(--ink-faint); font-weight:500;}

  .net{margin-top:12px; background:var(--jade); color:#fff; border-radius:16px; padding:16px 18px; display:flex; align-items:center; justify-content:space-between;}
  .net .k{font-size:13px; font-weight:600; opacity:.92;}
  .net .k .ta{display:block; font-size:11px; opacity:.8; margin-top:1px;}
  .net .v{font-size:26px; font-weight:700; letter-spacing:.3px;}
  .net .v .cur{opacity:.7; font-size:18px; font-weight:600;}
  .slip-foot{text-align:center; font-size:11px; color:var(--ink-faint); margin-top:16px; line-height:1.5;}
  .slip-monthly{margin-left:auto; text-align:right;}
  .slip-monthly .ml{font-size:9.5px; letter-spacing:.9px; text-transform:uppercase; color:var(--ink-faint); font-weight:700;}
  .slip-monthly .mv{font-size:15px; font-weight:700;}
  .slip-words{text-align:center; font-size:11.5px; color:var(--ink-faint); font-style:italic; margin-top:11px;}
  .slip-ack{display:flex; gap:36px; margin-top:24px;}
  .slip-ack div{flex:1; border-top:1.4px solid var(--line); padding-top:8px; font-size:11px; color:var(--ink-soft); letter-spacing:.3px;}

  .slip-adv-ctl{background:var(--card); border-radius:14px; box-shadow:var(--shadow); padding:14px; margin-top:14px; border:1px solid rgba(231,227,218,.6);}
  .slip-adv-ctl .t{font-size:13.5px; font-weight:650;}
  .slip-adv-ctl .p{font-size:12px; color:var(--ink-faint); margin:3px 0 10px;}
  .slip-adv-ctl .rowc{display:flex; gap:8px;}
  .slip-adv-ctl input{flex:1; font-size:15px; padding:11px; border:1.5px solid var(--line); border-radius:11px; background:var(--paper); outline:none; color:var(--ink); min-width:0;}
  .slip-adv-ctl input:focus{border-color:var(--jade);}
  .slip-adv-ctl .apply{padding:0 18px; border-radius:11px; background:var(--ink); color:var(--paper); font-weight:600; font-size:14px; white-space:nowrap;}
  .slip-adv-ctl .linkbtn{margin-top:14px; color:var(--jade); font-weight:600; font-size:14px; padding:6px 2px; display:inline-block;}
  .slip-adv-ctl .give-form{margin-top:10px; display:flex; flex-direction:column; gap:8px;}
  .slip-adv-ctl .apply.full{width:100%; height:46px; padding:0; background:var(--jade);}
  .btn-ghost.slip-full{width:100%; height:44px; border-radius:13px; font-size:14px; margin-top:10px;}

  .cat-chips{display:flex; flex-wrap:wrap; gap:8px;}
  .cat-chip{padding:9px 15px; border-radius:999px; font-size:13px; font-weight:600; background:var(--line-soft); color:var(--ink-soft); transition:transform .08s;}
  .cat-chip:active{transform:scale(.94);}
  .cat-chip.on{background:var(--jade); color:#fff;}
  .cat-chip.other{background:transparent; box-shadow:inset 0 0 0 1.5px var(--line); color:var(--ink-soft);}
  .field-col{padding:12px 0 14px; border-bottom:1px solid var(--line-soft);}
  .field-col:last-child{border-bottom:none;}
  .field-col > label{display:block; font-size:14px; color:var(--ink-soft); margin-bottom:10px;}

  /* Two-panel salary document */
  .doc-h{font-size:9.5px; letter-spacing:2px; text-transform:uppercase; color:var(--jade); font-weight:700; margin-bottom:8px; padding-bottom:9px; border-bottom:1px solid var(--line);}
  .slip-cols{margin-top:6px; display:flex; flex-direction:column;}
  .slip-side{margin-top:20px; padding-top:18px; border-top:1.5px solid var(--line);}
  .calc-line{font-size:12px; color:var(--ink-faint); padding:3px 0 3px 2px; font-variant-numeric:tabular-nums;}
  .calc-line b{color:var(--ink-soft); font-weight:600;}
  .totrow{display:flex; justify-content:space-between; font-size:13px; padding:6px 0; color:var(--ink-soft);}
  .totrow .v{font-weight:600;}
  .pendrow{display:flex; justify-content:space-between; margin-top:8px; padding-top:10px; border-top:1.5px solid var(--line); font-weight:700; font-size:15px;}
  .pendrow .ta{display:block; font-size:10px; color:var(--ink-faint); font-weight:500;}
  .aln{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line-soft); font-size:13px;}
  .aln:last-child{border-bottom:none;}
  .aln .adt{color:var(--ink-faint); width:64px; flex:none; font-variant-numeric:tabular-nums;}
  .aln .aty{flex:1; color:var(--ink-soft);}
  .aln .aam{font-weight:650; font-variant-numeric:tabular-nums; white-space:nowrap;}
  .aln .aam.g{color:var(--jade);} .aln .aam.d{color:var(--ochre);}

  .slip-actions{display:flex; gap:10px; margin-top:16px;}
  .slip-actions .btn-primary{background:var(--jade);}
  .sharehint{text-align:center; font-size:11.5px; color:var(--ink-faint); margin-top:10px;}

  /* Printable two-panel statement */
  .statement{background:#fff; padding:22px 20px 16px; color:var(--ink);}
  .st-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding-bottom:13px; border-bottom:2px solid var(--ink);}
  .st-brand{display:flex; align-items:center; gap:10px;}
  .st-mark{width:30px; height:30px; border-radius:8px; background:var(--jade); display:grid; place-items:center; flex:none; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
  .st-mark svg{width:16px; height:16px;}
  .st-ey{font-size:9.5px; letter-spacing:1.4px; text-transform:uppercase; color:var(--ink-faint); font-weight:700;}
  .st-mo{font-family:var(--serif); font-size:20px; font-weight:600; margin-top:1px; line-height:1.1;}
  .st-person{text-align:right;}
  .st-nm{font-size:16px; font-weight:700;}
  .st-rl{font-size:12px; color:var(--ink-soft); margin-top:2px;}

  .st-grid{display:flex; flex-direction:column; gap:22px; margin-top:16px;}
  .panel{break-inside:avoid;}
  .panel h3{font-size:10.5px; letter-spacing:1px; text-transform:uppercase; color:var(--jade); font-weight:700; margin:0 0 4px; padding-bottom:7px; border-bottom:1.5px solid var(--jade-soft); display:flex; justify-content:space-between;}
  .panel h3 .sec{color:var(--ink-faint); font-weight:600;}
  .crow{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:9px 0; border-bottom:1px solid var(--line-soft); font-size:13.5px;}
  .clab{color:var(--ink-soft); display:flex; flex-direction:column; gap:1px;}
  .clab .ta{font-size:10.5px; color:var(--ink-faint);}
  .cnote{font-size:11px; color:var(--ink-faint); margin-top:2px;}
  .cval{font-weight:600; font-variant-numeric:tabular-nums; white-space:nowrap;}
  .cval.ded{color:var(--red);}
  .st-net{display:flex; justify-content:space-between; align-items:center; margin-top:12px; background:var(--jade); color:#fff; border-radius:12px; padding:13px 15px; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
  .st-net .l{font-size:12.5px; font-weight:600; opacity:.92;}
  .st-net .l .ta{display:block; font-size:10px; opacity:.8;}
  .st-net .r{font-size:22px; font-weight:700; font-variant-numeric:tabular-nums;}

  .ledger{border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-top:2px;}
  .lrow{display:grid; grid-template-columns:auto 1fr auto; gap:10px; padding:8px 12px; font-size:12.5px; border-bottom:1px solid var(--line-soft);}
  .lrow:last-child{border-bottom:none;}
  .lhead{background:var(--line-soft); font-size:9.5px; letter-spacing:.5px; text-transform:uppercase; color:var(--ink-faint); font-weight:700; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
  .ld{color:var(--ink-soft); font-variant-numeric:tabular-nums;}
  .lt{color:var(--ink-soft);}
  .la{font-weight:600; text-align:right; font-variant-numeric:tabular-nums;}
  .la.g{color:var(--jade);} .la.d{color:var(--ochre);}
  .ltot{margin-top:10px;}
  .ltot>div{display:flex; justify-content:space-between; font-size:12.5px; color:var(--ink-soft); padding:5px 2px;}
  .ltot .lpend{margin-top:4px; padding-top:9px; border-top:1.5px solid var(--ink); font-size:15px; font-weight:700; color:var(--ink);}
  .ltot .lpend .ta{font-size:10px; color:var(--ink-faint); font-weight:500;}
  .st-empty{text-align:center; color:var(--ink-faint); font-size:13px; padding:22px 0; border:1px dashed var(--line); border-radius:10px;}

  .st-foot{display:flex; justify-content:space-between; align-items:flex-end; margin-top:20px; padding-top:14px; border-top:1px solid var(--line-soft);}
  .sign-line{width:130px; border-bottom:1px solid var(--ink-faint); height:24px;}
  .sign-lab{font-size:10px; color:var(--ink-faint); margin-top:4px; letter-spacing:.4px;}
  .gen{font-size:10px; color:var(--ink-faint); text-align:right;}

  /* Manage */
  .m-section{margin-top:22px;}
  .m-label{font-size:11px; letter-spacing:1.4px; text-transform:uppercase; color:var(--ink-soft); font-weight:700; margin:0 2px 13px;}
  .field{background:var(--card); border-radius:14px; box-shadow:var(--shadow); padding:4px 14px; border:1px solid rgba(231,227,218,.6);}
  .field-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 0; border-bottom:1px solid var(--line-soft);}
  .field-row:last-child{border-bottom:none;}
  .field-row label{font-size:14px; color:var(--ink-soft); flex:none;}
  .field-row input{font-size:15px; font-weight:600; text-align:right; border:none; background:transparent; color:var(--ink); width:130px; outline:none; -webkit-appearance:none;}
  .seg{display:inline-flex; background:var(--line-soft); border-radius:10px; padding:3px;}
  .seg button{font-size:12.5px; font-weight:600; padding:6px 12px; border-radius:8px; color:var(--ink-soft);}
  .seg button.on{background:var(--card); color:var(--ink); box-shadow:0 1px 3px rgba(35,32,27,.12);}

  .staff-edit{margin-bottom:16px;}
  .se-head{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
  .se-head .avatar{width:40px; height:40px; border-radius:12px; font-size:15px;}
  .se-name{flex:1; font-size:16px; font-weight:650; border:none; background:transparent; outline:none; color:var(--ink); border-bottom:1.5px solid var(--line-soft); padding:5px 0;}
  .se-del{width:36px; height:36px; border-radius:10px; display:grid; place-items:center; color:var(--red); background:#F7E4DE; flex:none;}
  .se-del svg{width:16px; height:16px;}
  .addstaff{width:100%; height:48px; border-radius:14px; background:var(--ink); color:var(--paper); font-weight:650; font-size:15px; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:6px;}
  .addstaff svg{width:18px; height:18px;}

  .add-dash svg{width:18px; height:18px;}
  .ns-langrow{display:flex; align-items:center; justify-content:space-between; padding:6px 2px 2px;}

  .m-cal-staff{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; -webkit-overflow-scrolling:touch;}

  .m-cal-staff button.on{background:var(--card); color:var(--ink); box-shadow:0 1px 3px rgba(35,32,27,.12);}
  .m-cal-hint{font-size:12.5px; color:var(--ink-soft); text-align:center; margin:8px 0 15px; line-height:1.5;}

  .danger{width:100%; height:46px; border-radius:14px; margin-top:4px; color:var(--red); font-weight:600; font-size:14px; background:transparent; box-shadow:inset 0 0 0 1.5px rgba(180,70,47,.3);}
  .danger:active{background:#F7E4DE;}

  /* Advance sheet */
  .adv-balance{background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:18px; text-align:center; margin-bottom:16px; border:1px solid rgba(231,227,218,.6);}
  .adv-balance .lbl{font-size:11px; letter-spacing:.8px; text-transform:uppercase; color:var(--ink-faint); font-weight:700;}
  .adv-balance .amt{font-size:32px; font-weight:700; margin-top:6px;}
  .adv-balance.zero .amt{color:var(--jade);}
  .adv-balance.owed .amt{color:var(--ochre);}
  .adv-form{background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:14px; margin-bottom:20px; display:flex; flex-direction:column; gap:10px; border:1px solid rgba(231,227,218,.6);}
  .adv-form .frow{display:flex; gap:10px;}
  .adv-form input{flex:1; font-size:15px; padding:12px; border:1.5px solid var(--line); border-radius:12px; background:var(--paper); outline:none; color:var(--ink); min-width:0;}
  .adv-form input:focus{border-color:var(--jade);}
  .adv-form .give{height:48px; border-radius:13px; background:var(--jade); color:#fff; font-weight:650; font-size:15px;}
  .adv-row{display:flex; align-items:center; gap:12px; padding:13px 4px; border-bottom:1px solid var(--line-soft);}
  .adv-row .ic{width:34px; height:34px; border-radius:10px; display:grid; place-items:center; flex:none;}
  .adv-row .ic svg{width:16px;height:16px;}
  .adv-row .ic.g{background:var(--jade-soft); color:var(--jade);}
  .adv-row .ic.d{background:var(--ochre-soft); color:var(--ochre);}
  .adv-row .meta{flex:1; min-width:0;}
  .adv-row .meta .ty{font-size:14px; font-weight:600;}
  .adv-row .meta .dt{font-size:12px; color:var(--ink-faint); margin-top:1px;}
  .adv-row .amt{font-weight:650; font-size:15px;}
  .adv-row .amt.g{color:var(--jade);} .adv-row .amt.d{color:var(--ochre);}
  .adv-row .del{color:var(--ink-faint); padding:6px 4px; font-size:18px;}
  .adv-empty{text-align:center; color:var(--ink-faint); font-size:13px; padding:26px 0;}
  .adv-seg{display:flex; width:100%; margin-bottom:2px;}
  .adv-seg button{flex:1;}
  .adv-tot{display:flex; justify-content:center; gap:20px; margin-top:9px; font-size:12px; color:var(--ink-faint); font-weight:600;}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
  @media print{
    @page{ size:A4; margin:14mm; }
    html{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    body{background:#fff;}
    .app,.toast{display:none !important;}
    .scrim{display:none !important;}
    #manageSheet,#advanceSheet,#addSheet{display:none !important;}
    .sheet-grip,.sheet-head,.slip-actions,.sharehint,.slip-adv-ctl{display:none !important;}
    .sheet{position:static; transform:none; max-height:none; max-width:none; width:100%; box-shadow:none; background:#fff;}
    .sheet-body{overflow:visible; padding:0;}

  }
</style>
</head>
<body>
  <div class="app" id="app"></div>

  <div class="scrim" id="slipScrim"></div>
  <div class="sheet" id="slipSheet">
    <div class="sheet-grip"><span></span></div>
    <div class="sheet-head"><div class="t">Salary slip</div><button class="x" id="slipClose">✕</button></div>
    <div class="sheet-body" id="slipBody"></div>
  </div>

  <div class="scrim" id="advanceScrim"></div>
  <div class="sheet" id="advanceSheet">
    <div class="sheet-grip"><span></span></div>
    <div class="sheet-head"><div class="t" id="advTitle">Advance</div><button class="x" id="advanceClose">✕</button></div>
    <div class="sheet-body" id="advanceBody"></div>
  </div>

  <div class="scrim" id="manageScrim"></div>
  <div class="sheet" id="manageSheet">
    <div class="sheet-grip"><span></span></div>
    <div class="sheet-head"><div class="t">Manage</div><button class="x" id="manageClose">✕</button></div>
    <div class="sheet-body" id="manageBody"></div>
  </div>

  <div class="scrim" id="addScrim"></div>
  <div class="sheet" id="addSheet">
    <div class="sheet-grip"><span></span></div>
    <div class="sheet-head"><div class="t">Add staff</div><button class="x" id="addClose">✕</button></div>
    <div class="sheet-body" id="addBody"></div>
  </div>

  <div class="installbar" id="installBar" hidden>
    <div class="ib-ic"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11 12 3l9 8"/><path d="M5 10v10h14V10"/></svg></div>
    <div class="ib-txt"><b id="ibTitle">Install this app</b><span id="ibHint">Runs full-screen, works offline</span></div>
    <button class="ib-btn" id="ibBtn">Install</button>
    <button class="ib-x" id="ibClose" aria-label="Dismiss">✕</button>
  </div>

  <div class="toast" id="toast"><span id="toastMsg"></span><button id="toastAction">Undo</button></div>

<script>
const KEY='household-ledger-v1';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW=['S','M','T','W','T','F','S'];
const COLORS=['#146B5B','#B4462F','#2F5A8F','#8A5A2B','#6B4E9E','#0E7A6B','#A23E5C','#4B6043'];

const TR={
  ta:{statement:'சம்பள விவரம்',attendance:'வருகை',worked:'வேலை',leave:'விடுப்பு',monthlySalary:'மாத சம்பளம்',daysInMonth:'மொத்த நாட்கள்',daysWorked:'வேலை நாட்கள்',leavesTaken:'எடுத்த விடுப்பு',allowed:'அனுமதி விடுப்பு',used:'பயன்படுத்தியது',deductibleDays:'கழிக்கப்படும் நாட்கள்',perDay:'ஒரு நாள் சம்பளம்',leaveDeduction:'விடுப்பு கழிவு',advance:'முன்பணம்',advDeducted:'இந்த மாத பிடித்தம்',pending:'மீதி முன்பணம்',given:'கொடுத்தது',deducted:'பிடித்தம்',netPay:'கொடுக்க வேண்டியது',noDed:'கழிவு இல்லை'},
  hi:{statement:'वेतन विवरण',attendance:'हाज़िरी',worked:'काम',leave:'छुट्टी',monthlySalary:'महीने का वेतन',daysInMonth:'महीने के दिन',daysWorked:'काम के दिन',leavesTaken:'ली गई छुट्टी',allowed:'मुफ़्त छुट्टी',used:'इस्तेमाल',deductibleDays:'कटौती वाले दिन',perDay:'एक दिन का वेतन',leaveDeduction:'छुट्टी कटौती',advance:'एडवांस',advDeducted:'इस महीने कटा',pending:'बाकी एडवांस',given:'दिया',deducted:'काटा',netPay:'मिलने वाली रकम',noDed:'कोई कटौती नहीं'}
};
function L(key,lang){ return (lang && TR[lang] && TR[lang][key]) ? TR[lang][key] : ''; }
function sub(key,lang){ const s=L(key,lang); return s?`<span class="ta">${s}</span>`:''; }

const DEFAULT_DB={
  version:2, settings:{rateBasis:'month'}, home:'Vaibhav',
  categories:['Chef','Maid','Night Time','Driver'],
  staff:[
    {id:'ram',name:'Ram Bhaiya',role:'Chef',salary:13000,paidLeaves:0,lang:'hi',color:'#146B5B'},
    {id:'valli',name:'Valli Akka',role:'Maid',salary:12000,paidLeaves:3,lang:'ta',color:'#B4462F'}
  ],
  leaves:{ram:{},valli:{}},
  advances:{ram:[],valli:[]}
};

let DB=null;
let viewDate=firstOfMonth(new Date());
let manageStaffId=null;

/* Storage — uses Claude storage inside the Claude app, and the phone's own
   localStorage when installed as a hosted home-screen app (persists offline, per device). */
const Store={
  async get(k){
    if(typeof window!=='undefined' && window.storage && window.storage.get){ try{ return await window.storage.get(k); }catch(e){} }
    try{ const v=localStorage.getItem(k); return v==null?null:{key:k,value:v}; }catch(e){ return null; }
  },
  async set(k,v){
    if(typeof window!=='undefined' && window.storage && window.storage.set){ try{ return await window.storage.set(k,v); }catch(e){} }
    try{ localStorage.setItem(k,v); return true; }catch(e){ return false; }
  }
};
async function load(){
  try{ const r=await Store.get(KEY); DB=r?JSON.parse(r.value):structuredClone(DEFAULT_DB); }
  catch(e){ DB=structuredClone(DEFAULT_DB); }
  DB.settings=DB.settings||{rateBasis:'month'};
  DB.leaves=DB.leaves||{}; DB.advances=DB.advances||{};
  DB.categories=DB.categories||['Chef','Maid','Night Time','Driver'];
  if(!DB.home) DB.home='Vaibhav';
  DB.staff.forEach(s=>{
    DB.leaves[s.id]=DB.leaves[s.id]||{};
    DB.advances[s.id]=DB.advances[s.id]||[];
    if(!s.lang) s.lang = s.id==='valli'?'ta':(s.id==='ram'?'hi':'none');
    if(!s.color) s.color=COLORS[0];
    if(s.role && !DB.categories.includes(s.role)) DB.categories.push(s.role);
  });
  if(!manageStaffId && DB.staff[0]) manageStaffId=DB.staff[0].id;
}
async function save(){ try{ await Store.set(KEY,JSON.stringify(DB)); }catch(e){} }
function uid(){ return 'e'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function esc(s){ return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function words(n){ n=Math.round(n); if(n===0) return 'Zero';
  const o=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const t=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  const two=x=> x<20?o[x]:(t[Math.floor(x/10)]+(x%10?' '+o[x%10]:''));
  const three=x=>{const h=Math.floor(x/100),r=x%100; let s=''; if(h)s+=o[h]+' Hundred'; if(r)s+=(s?' ':'')+two(r); return s;};
  let p=[]; const cr=Math.floor(n/10000000); n%=10000000; const la=Math.floor(n/100000); n%=100000; const th=Math.floor(n/1000); n%=1000; const hu=n;
  if(cr)p.push(three(cr)+' Crore'); if(la)p.push(two(la)+' Lakh'); if(th)p.push(two(th)+' Thousand'); if(hu)p.push(three(hu));
  return p.join(' ');
}
function chipButtons(selected){
  return DB.categories.map(cat=>`<button type="button" class="cat-chip ${cat===selected?'on':''}" data-cat="${esc(cat)}">${esc(cat)}</button>`).join('')
    + `<button type="button" class="cat-chip other" data-cat="__other__">+ Other</button>`;
}
function chipButtonsStaff(selected, staffId){
  return DB.categories.map(cat=>`<button type="button" class="cat-chip ${cat===selected?'on':''}" data-staffcat="${staffId}" data-cat="${esc(cat)}">${esc(cat)}</button>`).join('')
    + `<button type="button" class="cat-chip other" data-staffcat="${staffId}" data-cat="__other__">+ Other</button>`;
}

/* Dates */
function firstOfMonth(d){ return new Date(d.getFullYear(),d.getMonth(),1); }
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function pad(n){ return String(n).padStart(2,'0'); }
function ymd(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function ymdParts(y,m,day){ return y+'-'+pad(m+1)+'-'+pad(day); }
function ymStr(y,m){ return y+'-'+pad(m+1); }
function isSameMonth(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth(); }
function inr(n){ return Math.round(n).toLocaleString('en-IN'); }
function fmtDate(iso){ const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}); }
function fmtDateY(iso){ const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }

/* Advance helpers */
function advEntries(id){ return (DB.advances[id]||[]).slice().sort((a,b)=> a.date<b.date?-1:a.date>b.date?1:0); }
function advGivenTotal(id){ return (DB.advances[id]||[]).filter(e=>e.type==='given').reduce((s,e)=>s+e.amount,0); }
function advDeductedTotal(id){ return (DB.advances[id]||[]).filter(e=>e.type==='deducted').reduce((s,e)=>s+e.amount,0); }
function advBalance(id){ return advGivenTotal(id)-advDeductedTotal(id); }
function advDeductedInMonth(id,ym){ return (DB.advances[id]||[]).filter(e=>e.type==='deducted'&&(e.date||'').slice(0,7)===ym).reduce((s,e)=>s+e.amount,0); }

/* Calc */
function leaveDaysInMonth(id,y,m){ const map=DB.leaves[id]||{}; const days=[]; const t=daysInMonth(y,m); for(let d=1;d<=t;d++){ if(map[ymdParts(y,m,d)]) days.push(d); } return days; }
function computePay(staff,y,m){
  const dim=daysInMonth(y,m);
  const leaveDays=leaveDaysInMonth(staff.id,y,m);
  const taken=leaveDays.length;
  const paid=Math.min(taken,staff.paidLeaves);
  const deductible=Math.max(0,taken-staff.paidLeaves);
  const divisor=DB.settings.rateBasis==='30'?30:dim;
  const dayRate=staff.salary/divisor;
  const leaveDeduction=Math.round(deductible*dayRate);
  const ym=ymStr(y,m);
  const advDed=advDeductedInMonth(staff.id,ym);
  const net=staff.salary-leaveDeduction-advDed;
  return {dim,leaveDays,taken,paid,deductible,dayRate,leaveDeduction,advDed,net,worked:dim-taken,ym};
}

/* Dashboard */
function initials(name){ const p=name.trim().split(/\s+/); return ((p[0][0]||'?')+(p[1]?p[1][0]:'')).toUpperCase(); }
function renderDashboard(){
  const y=viewDate.getFullYear(), m=viewDate.getMonth();
  const now=new Date(); const isCurrent=isSameMonth(viewDate,now);
  let totalNet=0; DB.staff.forEach(s=>{ totalNet+=computePay(s,y,m).net; });

  const cards=DB.staff.map(s=>{
    const c=computePay(s,y,m);
    const onLeaveToday=isCurrent && !!(DB.leaves[s.id]||{})[ymd(now)];
    const bal=advBalance(s.id);

    let chip;
    if(s.paidLeaves>0){
      if(c.deductible>0) chip=`<span class="chip over"><span class="dot"></span>${c.taken} leaves · ${c.deductible} over</span>`;
      else chip=`<span class="chip clean"><span class="dot"></span>${c.taken} of ${s.paidLeaves} paid leaves used</span>`;
    }else{
      if(c.taken>0) chip=`<span class="chip leave"><span class="dot"></span>${c.taken} leave${c.taken>1?'s':''} this month</span>`;
      else chip=`<span class="chip clean"><span class="dot"></span>Full attendance</span>`;
    }
    let hero='';
    if(isCurrent){
      hero = onLeaveToday
        ? `<button class="btn btn-marked" data-undo="${s.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>On leave today</button>`
        : `<button class="btn btn-primary" data-leave="${s.id}">Mark leave today</button>`;
    }

    return `
      <div class="card">
        <div class="card-head">
          <div class="avatar" style="background:${s.color}">${initials(s.name)}</div>
          <div class="who"><div class="nm">${s.name}</div><div class="rl">${s.role}</div></div>
          <div class="pay"><div class="big"><span class="cur">₹</span><span class="num">${inr(s.salary)}</span></div><div class="per">per month</div></div>
        </div>
        <div class="statusrow">${chip}</div>
        ${hero}
        <div class="actions2">
          <button class="btn btn-ghost ${bal>0?'owed':''}" data-advance="${s.id}">Advance${bal>0?' · ₹'+inr(bal):''}</button>
          <button class="btn btn-ghost" data-slip="${s.id}">Pay slip</button>
        </div>
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML=`
    <div class="topbar">
      <div class="brand"><div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11 12 3l9 8"/><path d="M5 10v10h14V10"/></svg></div><div class="name">${esc(DB.home)}</div></div>
      <div class="monthnav">
        <button id="prevM"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
        <div class="label">${MONTHS[m]} <span class="yr">${y}</span></div>
        <button id="nextM"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
      </div>
    </div>
    <div class="summary"><div class="lbl">Payable this month</div><div class="amt"><span class="cur">₹</span><span class="num">${inr(totalNet)}</span></div></div>
    ${cards || '<div class="adv-empty">No staff yet — add your first below.</div>'}
    <button class="add-dash" id="dashAdd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Add staff</button>
    <div class="managebar"><button id="openManage"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>Staff, advances &amp; settings</button></div>`;

  document.getElementById('prevM').onclick=()=>{ viewDate=new Date(y,m-1,1); renderDashboard(); };
  document.getElementById('nextM').onclick=()=>{ viewDate=new Date(y,m+1,1); renderDashboard(); };
  document.getElementById('openManage').onclick=openManage;
  document.getElementById('dashAdd').onclick=openAddStaff;
  document.querySelectorAll('[data-leave]').forEach(b=>b.onclick=()=>markLeaveToday(b.dataset.leave));
  document.querySelectorAll('[data-undo]').forEach(b=>b.onclick=()=>unmarkLeaveToday(b.dataset.undo));
  document.querySelectorAll('[data-slip]').forEach(b=>b.onclick=()=>openSlip(b.dataset.slip));
  document.querySelectorAll('[data-advance]').forEach(b=>b.onclick=()=>openAdvance(b.dataset.advance));
}

/* Leave */
async function markLeaveToday(id){
  const key=ymd(new Date());
  DB.leaves[id]=DB.leaves[id]||{}; DB.leaves[id][key]=true;
  await save(); const s=DB.staff.find(x=>x.id===id); renderDashboard();
  showToast(`${s.name.split(' ')[0]}'s leave marked for today`, ()=>unmarkLeaveToday(id,key));
}

/* Toast */
let toastTimer=null;
function showToast(msg,onUndo){ const t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=msg; const b=document.getElementById('toastAction'); b.style.display=onUndo?'block':'none'; b.onclick=()=>{ if(onUndo)onUndo(); }; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(hideToast,4200); }
function hideToast(){ document.getElementById('toast').classList.remove('show'); }

/* Calendar */
function renderCalendar(y,m,staffId,{editable=false}={}){
  const dim=daysInMonth(y,m); const firstDow=new Date(y,m,1).getDay();
  const leaveMap=DB.leaves[staffId]||{}; const now=new Date(); const todayKey=ymd(now);
  let cells='';
  for(let i=0;i<firstDow;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const key=ymdParts(y,m,d); const isLeave=!!leaveMap[key];
    const cd=new Date(y,m,d); const isFuture=cd>now&&key!==todayKey; const isToday=key===todayKey;
    let cls='cal-cell'; if(isLeave)cls+=' leave'; else if(isFuture)cls+=' future'; else cls+=' worked';
    if(isToday)cls+=' today'; if(editable)cls+=' tap';
    cells+=`<div class="${cls}" ${editable?`data-day="${d}"`:''}>${d}</div>`;
  }
  return `<div class="cal-grid">${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>`;
}

let advStaffId=null, advMode='given';
const SVG_PLUS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';
const SVG_MINUS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 12h14"/></svg>';

    DB.advances[s.id]=DB.advances[s.id]||[];

(function(){

  const isIOS=()=> /iphone|ipad|ipod/i.test(navigator.userAgent);
  const dismissed=()=>{ try{ return sessionStorage.getItem('ibDismiss')==='1'; }catch(e){ return false; } };
  function show(mode){
    if(standalone()||dismissed()) return;
    if(mode==='ios'){ btn.style.display='none'; title.textContent='Add to Home Screen'; hint.textContent='Tap Share ⬆, then “Add to Home Screen”'; }
    else { btn.style.display=''; title.textContent='Install this app'; hint.textContent='Runs full-screen, works offline'; }
    bar.hidden=false;
  }
  window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferred=e; show('android'); });
  window.addEventListener('appinstalled', ()=>{ bar.hidden=true; });
  btn.onclick=async()=>{ if(deferred){ deferred.prompt(); try{ await deferred.userChoice; }catch(e){} deferred=null; bar.hidden=true; } };
  document.getElementById('ibClose').onclick=()=>{ bar.hidden=true; try{ sessionStorage.setItem('ibDismiss','1'); }catch(e){} };
  if(isIOS() && !standalone()){ setTimeout(()=>show('ios'), 1400); }
})();

if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
</body>
